    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Emergency Contact | Healthcare</title>
        <style>
            /* Google Fonts */
            body {
                font-family: 'Poppins', sans-serif;
                margin: 0;
                padding: 0;
                background-color: #f7f7f7;
                text-align: center;
            }

            /* Header Navigation */
           /* Fixed Header */
.header {
    background: black;
    padding: 15px 0;
    position: fixed; /* Makes the header stay in place */
    top: 0;
    width: 100%;
    z-index: 1000; 
    text-align: center;
}


body {
    padding-top: 60px; /* Adjust this based on the header height */
}


            .header nav {
                display: flex;
                justify-content: center;
                gap: 20px;
            }

            .header a {
                color: white;
                text-decoration: none;
                font-size: 18px;
                font-weight: 600;
                padding: 10px 15px;
            }

            .header a:hover {
                background: #d32f2f;
                border-radius: 5px;
            }

            /* Hero Section */
            .hero {
                background-image: url(hospital.jpg);
                background-size: cover;
                height: 300px;
                position: relative;
            }

            .overlay {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.6);
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                color: white;
            }

            .hero h1 {
                font-size: 2.5em;
                margin: 0;
            }

            .hero .tagline {
                font-size: 1.2em;
                font-weight: 300;
                color: white;
            }

            /* Contact Section */
            .container {
                max-width: 900px;
                margin: 30px auto;
                background: white;
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }

            /* Contact Info */
            .contact-info {
                display: flex;
                justify-content: space-between;
                flex-wrap: wrap;
            }

            .contact-item {
                flex: 1;
                margin: 15px;
                padding: 20px;
                background: #ffebee;
                border-radius: 10px;
                text-align: center;
                box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            }

            .contact-item img {
                width: 60px;
                margin-bottom: 10px;
            }

            h2 {
                color: #b71c1c;
            }

            p {
                color: #444;
            }

            .btn {
                display: inline-block;
                margin-top: 10px;
                padding: 10px 20px;
                color: white;
                background: #d32f2f;
                text-decoration: none;
                border-radius: 5px;
                font-weight: bold;
            }

            .btn:hover {
                background: #b71c1c;
            }

            /* Map */
            .map-container {
                margin-top: 20px;
                border-radius: 10px;
                overflow: hidden;
                box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            }

            /* Responsive Design */
            @media (max-width: 768px) {
                .contact-info {
                    flex-direction: column;
                    align-items: center;
                }

                .header nav {
                    flex-direction: column;
                }

                .header a {
                    display: block;
                    padding: 10px;
                }
            }
        </style>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    </head>

    <body>

        <!-- Header -->
        <header class="header">
            <nav>
                <a href="project.html">Home</a>
                <a href="contact.html">Contact</a>
                <a href="about1.html">About</a>
                <a href="services2.html">Services</a>
            </nav>
        </header>

        <!-- Hero Section -->
        <div class="hero">
            <div class="overlay">
                <h1>Emergency Contact</h1>
                <p class="tagline">Immediate medical assistance available 24/7</p>
            </div>
        </div>

        <!-- Contact Section -->
        <div class="container">
            <div class="contact-info">
                <div class="contact-item">
                    <img src="telephone.png" alt="Phone">
                    <h2>Call Emergency</h2>
                    <p><strong>108</strong></p>
                    <a href="tel:+18001234567" class="btn">Call Now</a>
                </div>
                <div class="contact-item">
                    <img src="email.png" alt="Email">
                    <h2>Email Us</h2>
                    <p>emergency@Mediverse.com</p>
                    <a href="mailto:emergency@yourhealthcare.com" class="btn">Send Email</a>
                </div>
                <div class="contact-item">
                    <img src="location.png" alt="Location">
                    <h2>Visit Us</h2>
                    <p>VIT PUNE, India, 1124</p>
                    <a href="https://maps.app.goo.gl/KvvPLwomFsGNaaVx7" target="_blank" class="btn">Get Directions</a>
                </div>
            </div>

            <!-- Map Section -->
            <div class="map-container">
                <iframe src="https://maps.google.com/maps?q=Pune, India&t=&z=13&ie=UTF8&iwloc=&output=embed" width="100%"
                    height="300" style="border:0;" allowfullscreen="" loading="lazy">
                </iframe>
            </div>
        </div>

    </body>

    </html>
