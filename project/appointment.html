<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book an Appointment</title>
  <style>
    /* Reset and base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color: rgb(17, 24, 39);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Video background */
    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .video-background video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Layout */
    .container {
      position: relative;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(to right, #46908c, hsl(206, 14%, 90%));
      padding: 1rem;
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      position: relative;
      z-index: 1;
    }

    header h1 {
      max-width: 80rem;
      margin: 0 auto;
      padding: 0.5rem 1rem;
      font-size: 1.875rem;
      font-weight: bold;
      color: white;
    }

    main {
      max-width: 80rem;
      margin: 0 auto;
      padding: 2rem 1rem;
      position: relative;
      z-index: 1;
    }

    .card {
      background-color: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      border-radius: 0.5rem;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      overflow: hidden;
    }

    /* Hero section */
    .hero {
      height: 12rem;
      position: relative;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(30, 58, 138, 0.4), rgba(37, 99, 235, 0.4));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 1rem;
    }

    .hero-overlay p {
      color: white;
      font-size: 1.25rem;
      font-weight: 500;
      text-align: center;
      max-width: 42rem;
    }

    /* Form styles */
    form {
      padding: 1.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    @media (min-width: 768px) {
      .form-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .form-section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: rgb(17, 24, 39);
      margin-bottom: 0.5rem;
    }

    .input-group {
      position: relative;
    }

    .icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 1.25rem;
      height: 1.25rem;
      color: rgb(156, 163, 175);
      pointer-events: none;
    }

    textarea~.icon {
      transform: none;
      top: 0.75rem;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 0.5rem 0.75rem 0.5rem 2.5rem;
      border: 1px solid rgb(209, 213, 219);
      border-radius: 0.375rem;
      font-size: 1rem;
      line-height: 1.5;
      color: rgb(17, 24, 39);
      background-color: white;
      transition: all 0.2s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: rgb(59, 130, 246);
      box-shadow: 0 0 0 3px rgb(147, 197, 253, 0.45);
    }

    select {
      appearance: none;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 0.5rem center;
      background-repeat: no-repeat;
      background-size: 1.5em 1.5em;
      padding-right: 2.5rem;
    }

    textarea {
      resize: vertical;
      min-height: 6rem;
    }

    /* Hide default date picker icon */
    input[type="date"]::-webkit-calendar-picker-indicator {
      opacity: 0;
    }

    /* Button styles */
    .button-container {
      display: flex;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    button {
      background-color: rgb(37, 99, 235);
      color: white;
      font-weight: 500;
      padding: 0.75rem 1.5rem;
      border-radius: 0.375rem;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: rgb(29, 78, 216);
    }

    button:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgb(147, 197, 253, 0.45);
    }

    /* Reset and base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      color: #111827;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Header with navigation */
    header {
      background: rgba(21, 0, 0, 0.753);
      padding: 10px;
      position: sticky;
      z-index: 1000;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 80rem;
      margin: 0 auto;
      padding: 0.5rem 1rem;
    }

    .navbar h1 {
      font-size: 1.875rem;
      font-weight: bold;
      color: white;
      
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 60px;
    }

    .nav-links li {
      display: inline;
    }

    .nav-links a {
      text-decoration: none;
      color: white;
      font-size: 1rem;
      font-weight: 500;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: blue;
      background :red;
      padding: 5px;

      }
  </style>
</head>

<body>
  <header>
    <div class="navbar">
      <h1>Book an Appointment</h1>
      <ul class="nav-links">
        <li><a href="project.html">Home</a></li>
      </ul>
    </div>
  </header>

  <div class="video-background">
    <video autoplay muted loop>
      <source src="background video.mp4" type="video/mp4">
    </video>
  </div>

  <div class="container">

    <main>
      <div class="card">
        <div class="hero">
          <img src="https://images.unsplash.com/photo-1631217868264-e5b90bb7e133?auto=format&fit=crop&q=80"
            alt="Healthcare">
          <div class="hero-overlay">
            <p>Your health is our priority. Schedule an appointment with our experienced healthcare professionals.</p>
          </div>
        </div>

        <form id="appointmentForm">
          <div class="form-grid">
            <!-- Personal Information -->
            <div class="form-section">
              <h2>Personal Information</h2>

              <div class="input-group">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
                <input type="text" name="name" placeholder="Full Name" required>
              </div>

              <div class="input-group">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <rect width="20" height="16" x="2" y="4" rx="2" />
                  <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                </svg>
                <input type="email" name="email" placeholder="Email Address" required>
              </div>

              <div class="input-group">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path
                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
                </svg>
                <input type="tel" name="phone" placeholder="Phone Number" required>
              </div>

              <div class="input-group">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="m6 9 6 6 6-6" />
                </svg>
                <select name="appointmentType" required>
                  <option value="">Select Appointment Type</option>
                  <option value="general">General Checkup</option>
                  <option value="specialist">Specialist Consultation</option>
                  <option value="followup">Follow-up Visit</option>
                  <option value="vaccination">Vaccination</option>
                  <option value="therapy">Physical Therapy</option>
                </select>
              </div>
            </div>

            <!-- Schedule -->
            <div class="form-section">
              <h2>Schedule</h2>

              <div class="input-group">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
                  <line x1="16" x2="16" y1="2" y2="6" />
                  <line x1="8" x2="8" y1="2" y2="6" />
                  <line x1="3" x2="21" y1="10" y2="10" />
                </svg>
                <input type="date" name="date" required>
              </div>

              <div class="input-group">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10" />
                  <polyline points="12 6 12 12 16 14" />
                </svg>
                <select name="time" required>
                  <option value="">Select Time</option>
                  <option value="0900">09:00 AM</option>
                  <option value="0930">09:30 AM</option>
                  <option value="1000">10:00 AM</option>
                  <option value="1030">10:30 AM</option>
                  <option value="1100">11:00 AM</option>
                  <option value="1130">11:30 AM</option>
                  <option value="1400">02:00 PM</option>
                  <option value="1430">02:30 PM</option>
                  <option value="1500">03:00 PM</option>
                  <option value="1530">03:30 PM</option>
                  <option value="1600">04:00 PM</option>
                </select>
              </div>

              <div class="input-group">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>
                <textarea name="notes" placeholder="Additional Notes (Optional)" rows="4"></textarea>
              </div>
            </div>
          </div>

          <div class="button-container">
            <button type="submit">Book Appointment</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script>
    document.getElementById('appointmentForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());
      console.log('Form submitted:', data);
      // Handle form submission here
    });
  </script>
</body>

</html>
