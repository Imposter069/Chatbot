<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediverse Signup</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #E8EDF5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-title {
            color: #2D3748;
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .signup-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            min-height: 600px;
        }

        .left-section {
            background: linear-gradient(135deg, #E7EDFF 0%, #F5F8FF 100%);
            width: 50%;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 3rem;
        }

        .content-wrapper {
            padding: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .logo {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .logo img {
            height: 70px;
            margin-right: 1rem;
        }

        .tagline {
            color: #2D3748;
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 3rem;
            max-width: 300px;
        }

        .illustration {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .stethoscope-3d {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .stethoscope-img {
            width: 280px;
            height: auto;
            filter: drop-shadow(0 30px 40px rgba(79, 112, 233, 0.4));
        }

        .right-section {
            flex: 1;
            padding: 3rem;
            position: relative;
        }

        .language-selector {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            color: #718096;
            font-size: 0.875rem;
            cursor: pointer;
        }

        .form-container {
            max-width: 400px;
            margin: 0 auto;
            padding-top: 1rem;
        }

        h2 {
            font-size: 1.75rem;
            color: #1A202C;
            margin-bottom: 2rem;
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            background: white;
            color: #4A5568;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .social-btn:hover {
            background: #F7FAFC;
        }

        .social-icon {
            width: 20px;
            height: 20px;
        }

        .divider {
            text-align: center;
            margin: 2rem 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #E2E8F0;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: white;
            padding: 0 1rem;
            color: #718096;
            font-size: 0.875rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4F70E9;
            box-shadow: 0 0 0 3px rgba(79, 112, 233, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #A0AEC0;
            cursor: pointer;
            padding: 0;
            font-size: 1.25rem;
        }

        .submit-btn {
            width: 100%;
            padding: 0.875rem;
            background: #4F70E9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            background: #3D5CDB;
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: #718096;
        }

        .login-link a {
            color: #4F70E9;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .signup-card {
                flex-direction: column;
            }

            .left-section {
                width: 100%;
                min-height: 400px;
            }

            .content-wrapper {
                padding: 2rem;
            }

            .right-section {
                padding: 2rem;
            }

            .stethoscope-img {
                width: 200px;
            }
        }

        p{
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-size: 40px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="page-title">Sign up Page</h1>
        <div class="signup-card">
            <div class="left-section">
                <div class="content-wrapper">
                    <div class="logo">
                        <img src="health-care_17247494.png" alt="Logo">
                        <p>Mediverse</p>
                    </div>
                    <div class="illustration">
                        <img src="stethoscope.png" alt="" height="410px" width="400px">
                    </div>
                </div>
            </div>
            <div class="right-section">
                <div class="language-selector">
                    English(US) ▼
                </div>
                <div class="form-container">
                    <h2>Create Your Account</h2>

                    <div class="social-buttons">
                        <button class="social-btn google">
                            <img src="https://www.google.com/favicon.ico" alt="Google" class="social-icon">
                            Sign up with Google
                        </button>
                       
                    </div>

                    <div class="divider">
                        <span>-OR-</span>
                    </div>

                    <form id="signupForm">
                        <div class="input-group">
                            <input type="text" name="fullName" placeholder="Full Name" required>
                        </div>
                        <div class="input-group">
                            <input type="email" name="email" placeholder="Email" required>
                        </div>
                        <div class="input-group">
                            <input type="password" name="password" placeholder="Password" required>
                            <button type="button" class="password-toggle">👁️</button>
                        </div>
                        <button type="submit" class="submit-btn">Create Account</button>
                    </form>

                    <p class="login-link">
                        Already have an Account? <a href="project.html">Log in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
